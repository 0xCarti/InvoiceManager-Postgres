services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USER:-invoicemanager}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-invoicemanager}
      - POSTGRES_DB=${DATABASE_NAME:-invoicemanager}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-invoicemanager} -d ${DATABASE_NAME:-invoicemanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/0xcarti/invoice-manager-postgres:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./import_files:/app/import_files
    env_file:
      - .env

volumes:
  postgres_data:
