version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-manager-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USER:-invoicemanager}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-invoicemanager}
      - POSTGRES_DB=${DATABASE_NAME:-invoicemanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    image: gwcarti/invoicemanager:latest
    container_name: invoice-manager
    depends_on:
      - postgres
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./import_files:/app/import_files
    env_file:
      - .env
    environment:
      - PORT=${PORT:-5000}
      - DATABASE_DRIVER=${DATABASE_DRIVER:-postgresql+psycopg}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-invoicemanager}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-invoicemanager}
      - DATABASE_NAME=${DATABASE_NAME:-invoicemanager}

volumes:
  postgres_data:
