services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USER:?DATABASE_USER must be set}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
      - POSTGRES_DB=${DATABASE_NAME:?DATABASE_NAME must be set}
    ports:
      - "127.0.0.1:${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:?DATABASE_USER must be set} -d ${DATABASE_NAME:?DATABASE_NAME must be set}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/0xcarti/invoice-manager-postgres:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./import_files:/app/import_files
    env_file:
      - .env

volumes:
  postgres_data:
