<tr>
    <td class="col-vendor-name">{{ vendor.first_name }} {{ vendor.last_name }}</td>
    <td class="col-vendor-gst">{{ 'Yes' if vendor.gst_exempt else 'No' }}</td>
    <td class="col-vendor-pst">{{ 'Yes' if vendor.pst_exempt else 'No' }}</td>
    <td class="col-vendor-actions">
        <div class="mobile-actions">
            <a href="{{ url_for('vendor.edit_vendor', vendor_id=vendor.id) }}" class="btn btn-primary btn-sm">Edit</a>
            <a href="{{ url_for('notes.entity_notes', entity_type='vendor', entity_id=vendor.id) }}" class="btn btn-outline-secondary btn-sm">Notes</a>
            <form action="{{ url_for('vendor.delete_vendor', vendor_id=vendor.id) }}" method="post" class="d-inline">
                {{ delete_form.hidden_tag() }}
                <button type="submit" class="btn btn-danger btn-sm" data-confirm-message="Are you sure you want to delete this vendor?">Delete</button>
            </form>
        </div>
    </td>
</tr>
