<tr>
    <td class="col-customer-name">{{ customer.first_name }} {{ customer.last_name }}</td>
    <td class="col-customer-gst">{{ 'Yes' if customer.gst_exempt else 'No' }}</td>
    <td class="col-customer-pst">{{ 'Yes' if customer.pst_exempt else 'No' }}</td>
    <td class="col-customer-actions">
        <div class="mobile-actions">
            <a href="{{ url_for('customer.edit_customer', customer_id=customer.id) }}" class="btn btn-primary btn-sm">Edit</a>
            <a href="{{ url_for('notes.entity_notes', entity_type='customer', entity_id=customer.id) }}" class="btn btn-outline-secondary btn-sm">Notes</a>
            <form action="{{ url_for('customer.delete_customer', customer_id=customer.id) }}" method="post" class="d-inline">
                {{ delete_form.hidden_tag() }}
                <button type="submit" class="btn btn-danger btn-sm" data-confirm-message="Are you sure you want to delete this customer?">Delete</button>
            </form>
        </div>
    </td>
</tr>
